name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  schedule:
    - cron: "15 0 * * 1"

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      APP_ENV: development
      INTERNAL_API_KEY: ci-internal-key
      AUTH_PASSWORD_SECRET: ci-password-secret
      AUTH_JWT_SECRET: ci-jwt-secret
      CORS_ORIGINS: http://localhost:8501,http://127.0.0.1:8501
      TRUSTED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Lint
        run: ruff check backend dashboard scripts tests

      - name: Lint (quality-gate staged rules)
        run: ruff check --select B,I,UP,SIM backend/app/services/auth backend/app/repositories/alert_repository.py backend/app/repositories/incident_repository.py

      - name: Type Check (mypy staged scope)
        run: mypy --config-file mypy.ini

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Type Check (pyright staged scope)
        run: pyright

      - name: Unit and API tests
        run: pytest -q

  migration-smoke:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: network_monitoring_ci
          MYSQL_USER: network_monitoring
          MYSQL_PASSWORD: network_monitoring
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -unetwork_monitoring -pnetwork_monitoring --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s
    env:
      DATABASE_URL: mysql+pymysql://network_monitoring:network_monitoring@127.0.0.1:3306/network_monitoring_ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/backend.txt

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/backend.txt
          pip install pytest==9.0.3

      - name: Run Alembic upgrade
        run: alembic upgrade head

      - name: Run MySQL integration tests
        run: pytest tests/services/test_mysql_integration.py -q

  non-functional-smoke:
    runs-on: ubuntu-latest
    env:
      APP_ENV: development
      DATABASE_URL: sqlite+aiosqlite:///./ci_nonfunctional.db
      INTERNAL_API_KEY: ci-internal-key
      AUTH_PASSWORD_SECRET: ci-password-secret
      AUTH_JWT_SECRET: ci-jwt-secret
      CORS_ORIGINS: http://localhost:8501,http://127.0.0.1:8501
      TRUSTED_HOSTS: localhost,127.0.0.1
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Start backend for smoke checks
        run: |
          python -m uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat uvicorn.log
          exit 1

      - name: Benchmark regression gate
        id: benchmark_gate
        continue-on-error: true
        run: |
          mkdir -p .ci_artifacts
          python scripts/benchmark_endpoints.py \
            --base-url http://127.0.0.1:8000 \
            --api-key ci-internal-key \
            --profile ci \
            --runs 3 \
            --output-json .ci_artifacts/benchmark.json

      - name: Concurrency smoke test
        id: concurrency_gate
        continue-on-error: true
        run: |
          python scripts/concurrency_smoke.py \
            --base-url http://127.0.0.1:8000 \
            --api-key ci-internal-key \
            --profile ci \
            --requests 10 \
            --concurrency 5 \
            --output-json .ci_artifacts/concurrency.json

      - name: Concurrency failure scenario (expected failure path)
        id: concurrency_expected_failure
        continue-on-error: true
        run: |
          if python scripts/concurrency_smoke.py \
            --base-url http://127.0.0.1:8000 \
            --api-key ci-internal-key \
            --profile custom \
            --path /health/live \
            --requests 5 \
            --concurrency 2 \
            --max-p95-ms 0.01 \
            --max-max-ms 0.01; then
            echo "Expected concurrency smoke to fail with impossible thresholds."
            exit 1
          fi

      - name: Observability payload smoke test
        id: observability_gate
        continue-on-error: true
        run: |
          python scripts/observability_payload_smoke.py \
            --base-url http://127.0.0.1:8000 \
            --api-key ci-internal-key \
            --output-json .ci_artifacts/observability_payload.json

      - name: Build non-functional triage + SLA artifacts
        if: always()
        run: |
          python scripts/nonfunctional_report.py \
            --artifacts-dir .ci_artifacts \
            --triage-output .ci_artifacts/nonfunctional_triage.md \
            --sla-output .ci_artifacts/weekly_sla_baseline.md \
            --sla-json-output .ci_artifacts/weekly_sla_baseline.json

      - name: Publish non-functional triage summary
        if: always()
        run: cat .ci_artifacts/nonfunctional_triage.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish weekly SLA baseline summary
        if: always()
        run: cat .ci_artifacts/weekly_sla_baseline.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload non-functional artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: non-functional-smoke-artifacts
          path: |
            .ci_artifacts/*.json
            .ci_artifacts/*.md
            uvicorn.log

      - name: Enforce non-functional quality gates
        if: always()
        run: |
          failures=0
          if [ "${{ steps.benchmark_gate.outcome }}" != "success" ]; then
            echo "Benchmark regression gate failed."
            failures=1
          fi
          if [ "${{ steps.concurrency_gate.outcome }}" != "success" ]; then
            echo "Concurrency smoke gate failed."
            failures=1
          fi
          if [ "${{ steps.concurrency_expected_failure.outcome }}" != "success" ]; then
            echo "Expected-failure scenario gate failed."
            failures=1
          fi
          if [ "${{ steps.observability_gate.outcome }}" != "success" ]; then
            echo "Observability payload smoke gate failed."
            failures=1
          fi
          if [ "$failures" -ne 0 ]; then
            exit 1
          fi

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t network-monitoring-backend-ci .

      - name: Build dashboard image
        run: docker build -f Dockerfile.dashboard -t network-monitoring-dashboard-ci .

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/backend.txt

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit semgrep

      - name: Audit backend dependencies
        run: pip-audit -r requirements/backend.txt

      - name: Audit dashboard dependencies
        run: pip-audit -r requirements/dashboard.txt

      - name: Bandit SAST (backend, scripts)
        run: |
          bandit -q -r backend scripts -x tests,venv

      - name: Semgrep SAST (staged security rules)
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/python \
            --error \
            --metrics=off \
            --exclude venv \
            --exclude tests \
            backend scripts dashboard

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
