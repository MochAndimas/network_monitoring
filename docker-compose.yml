services:
  mysql:
    image: mysql:8.4
    container_name: network_monitoring_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-network_monitoring}
      MYSQL_USER: ${MYSQL_USER:-network_monitoring}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: network_monitoring_backend_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Network Monitoring}
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-network_monitoring}:${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}@mysql:3306/${MYSQL_DATABASE:-network_monitoring}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_ALERT_GRACE_PERIOD_SECONDS: ${TELEGRAM_ALERT_GRACE_PERIOD_SECONDS:-60}
      MIKROTIK_HOST: ${MIKROTIK_HOST:-}
      MIKROTIK_PORT: ${MIKROTIK_PORT:-8728}
      MIKROTIK_USERNAME: ${MIKROTIK_USERNAME:-}
      MIKROTIK_PASSWORD: ${MIKROTIK_PASSWORD:-}
      MIKROTIK_DYNAMIC_SECTIONS: ${MIKROTIK_DYNAMIC_SECTIONS:-interface,firewall,queue}
      MIKROTIK_DYNAMIC_FIREWALL_SECTION_ALLOWLIST: ${MIKROTIK_DYNAMIC_FIREWALL_SECTION_ALLOWLIST:-filter,nat}
      MIKROTIK_DYNAMIC_INTERFACE_ALLOWLIST: ${MIKROTIK_DYNAMIC_INTERFACE_ALLOWLIST:-}
      MIKROTIK_DYNAMIC_QUEUE_ALLOWLIST: ${MIKROTIK_DYNAMIC_QUEUE_ALLOWLIST:-}
      MIKROTIK_DYNAMIC_MAX_INTERFACES: ${MIKROTIK_DYNAMIC_MAX_INTERFACES:-64}
      MIKROTIK_DYNAMIC_MAX_FIREWALL_RULES: ${MIKROTIK_DYNAMIC_MAX_FIREWALL_RULES:-128}
      MIKROTIK_DYNAMIC_MAX_QUEUES: ${MIKROTIK_DYNAMIC_MAX_QUEUES:-64}
      DASHBOARD_API_URL: http://backend:8000
      PING_TIMEOUT_SECONDS: ${PING_TIMEOUT_SECONDS:-2}
      PING_SAMPLE_COUNT: ${PING_SAMPLE_COUNT:-3}
      PING_CONCURRENCY_LIMIT: ${PING_CONCURRENCY_LIMIT:-32}
      MONITOR_TASK_CONCURRENCY_LIMIT: ${MONITOR_TASK_CONCURRENCY_LIMIT:-16}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_INTERVAL_INTERNET_SECONDS: ${SCHEDULER_INTERVAL_INTERNET_SECONDS:-30}
      SCHEDULER_INTERVAL_DEVICE_SECONDS: ${SCHEDULER_INTERVAL_DEVICE_SECONDS:-60}
      SCHEDULER_INTERVAL_SERVER_SECONDS: ${SCHEDULER_INTERVAL_SERVER_SECONDS:-60}
      SCHEDULER_INTERVAL_MIKROTIK_SECONDS: ${SCHEDULER_INTERVAL_MIKROTIK_SECONDS:-60}
      SCHEDULER_INTERVAL_ALERT_SECONDS: ${SCHEDULER_INTERVAL_ALERT_SECONDS:-30}
      SCHEDULER_JOB_MAX_INSTANCES: ${SCHEDULER_JOB_MAX_INSTANCES:-1}
      DNS_CHECK_HOST: ${DNS_CHECK_HOST:-google.com}
      HTTP_CHECK_URL: ${HTTP_CHECK_URL:-https://www.google.com/generate_204}
      PUBLIC_IP_CHECK_URL: ${PUBLIC_IP_CHECK_URL:-https://api.ipify.org}
      MONITORING_LOCK_NAME: ${MONITORING_LOCK_NAME:-network_monitoring.pipeline}
      MONITORING_LOCK_TIMEOUT_SECONDS: ${MONITORING_LOCK_TIMEOUT_SECONDS:-900}
      RAW_METRIC_RETENTION_DAYS: ${RAW_METRIC_RETENTION_DAYS:-7}
      RETENTION_ROLLUP_BATCH_SIZE: ${RETENTION_ROLLUP_BATCH_SIZE:-500}
      RETENTION_ARCHIVE_BATCH_SIZE: ${RETENTION_ARCHIVE_BATCH_SIZE:-500}
      ALERT_RETENTION_DAYS: ${ALERT_RETENTION_DAYS:-180}
      INCIDENT_RETENTION_DAYS: ${INCIDENT_RETENTION_DAYS:-180}
      SCHEDULER_CLEANUP_INTERVAL_HOURS: ${SCHEDULER_CLEANUP_INTERVAL_HOURS:-24}
      SCHEDULER_JOB_STALE_FACTOR: ${SCHEDULER_JOB_STALE_FACTOR:-3}
      CPU_WARNING_THRESHOLD: ${CPU_WARNING_THRESHOLD:-90}
      RAM_WARNING_THRESHOLD: ${RAM_WARNING_THRESHOLD:-90}
      DISK_WARNING_THRESHOLD: ${DISK_WARNING_THRESHOLD:-85}
      SERVER_RESOURCE_DEVICE_IP: ${SERVER_RESOURCE_DEVICE_IP:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      INTERNAL_API_KEYS: ${INTERNAL_API_KEYS:-}
      AUTH_PASSWORD_SECRET: ${AUTH_PASSWORD_SECRET:-}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-720}
      AUTH_REMEMBER_TTL_MINUTES: ${AUTH_REMEMBER_TTL_MINUTES:-10080}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-network-monitoring}
      AUTH_JWT_ALGORITHM: ${AUTH_JWT_ALGORITHM:-HS256}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-network_monitoring_session}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-network_monitoring_refresh}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_LOGIN_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-5}
      AUTH_LOGIN_RATE_LIMIT_WINDOW_MINUTES: ${AUTH_LOGIN_RATE_LIMIT_WINDOW_MINUTES:-15}
      AUTH_SESSION_TOUCH_INTERVAL_SECONDS: ${AUTH_SESSION_TOUCH_INTERVAL_SECONDS:-300}
      AUTH_SESSION_RETENTION_DAYS: ${AUTH_SESSION_RETENTION_DAYS:-30}
      AUTH_LOGIN_ATTEMPT_RETENTION_DAYS: ${AUTH_LOGIN_ATTEMPT_RETENTION_DAYS:-7}
      AUTH_PASSWORD_MIN_LENGTH: ${AUTH_PASSWORD_MIN_LENGTH:-12}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_FULL_NAME: ${BOOTSTRAP_ADMIN_FULL_NAME:-Monitoring Admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?BOOTSTRAP_ADMIN_PASSWORD must be set}
      ALLOW_INSECURE_NO_AUTH: ${ALLOW_INSECURE_NO_AUTH:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS must be set}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:?TRUSTED_HOSTS must be set}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
      PRINTER_SNMP_COMMUNITIES: ${PRINTER_SNMP_COMMUNITIES:-}
      OBSERVABILITY_ENABLE_METRICS: ${OBSERVABILITY_ENABLE_METRICS:-true}
      LOG_AS_JSON: ${LOG_AS_JSON:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REQUEST_SLOW_LOG_THRESHOLD_MS: ${REQUEST_SLOW_LOG_THRESHOLD_MS:-1000}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      PROMETHEUS_MULTIPROC_DIR: ${PROMETHEUS_MULTIPROC_DIR:-/tmp/network_monitoring_prometheus}
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    profiles: ["ops"]
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Network Monitoring}
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-network_monitoring}:${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}@mysql:3306/${MYSQL_DATABASE:-network_monitoring}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["sh", "/app/scripts/run-migrations.sh"]

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: network_monitoring_scheduler
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Network Monitoring}
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-network_monitoring}:${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}@mysql:3306/${MYSQL_DATABASE:-network_monitoring}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_ALERT_GRACE_PERIOD_SECONDS: ${TELEGRAM_ALERT_GRACE_PERIOD_SECONDS:-60}
      MIKROTIK_HOST: ${MIKROTIK_HOST:-}
      MIKROTIK_PORT: ${MIKROTIK_PORT:-8728}
      MIKROTIK_USERNAME: ${MIKROTIK_USERNAME:-}
      MIKROTIK_PASSWORD: ${MIKROTIK_PASSWORD:-}
      MIKROTIK_DYNAMIC_SECTIONS: ${MIKROTIK_DYNAMIC_SECTIONS:-interface,firewall,queue}
      MIKROTIK_DYNAMIC_FIREWALL_SECTION_ALLOWLIST: ${MIKROTIK_DYNAMIC_FIREWALL_SECTION_ALLOWLIST:-filter,nat}
      MIKROTIK_DYNAMIC_INTERFACE_ALLOWLIST: ${MIKROTIK_DYNAMIC_INTERFACE_ALLOWLIST:-}
      MIKROTIK_DYNAMIC_QUEUE_ALLOWLIST: ${MIKROTIK_DYNAMIC_QUEUE_ALLOWLIST:-}
      MIKROTIK_DYNAMIC_MAX_INTERFACES: ${MIKROTIK_DYNAMIC_MAX_INTERFACES:-64}
      MIKROTIK_DYNAMIC_MAX_FIREWALL_RULES: ${MIKROTIK_DYNAMIC_MAX_FIREWALL_RULES:-128}
      MIKROTIK_DYNAMIC_MAX_QUEUES: ${MIKROTIK_DYNAMIC_MAX_QUEUES:-64}
      DASHBOARD_API_URL: http://backend:8000
      PING_TIMEOUT_SECONDS: ${PING_TIMEOUT_SECONDS:-2}
      PING_SAMPLE_COUNT: ${PING_SAMPLE_COUNT:-3}
      PING_CONCURRENCY_LIMIT: ${PING_CONCURRENCY_LIMIT:-32}
      MONITOR_TASK_CONCURRENCY_LIMIT: ${MONITOR_TASK_CONCURRENCY_LIMIT:-16}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_INTERVAL_INTERNET_SECONDS: ${SCHEDULER_INTERVAL_INTERNET_SECONDS:-30}
      SCHEDULER_INTERVAL_DEVICE_SECONDS: ${SCHEDULER_INTERVAL_DEVICE_SECONDS:-60}
      SCHEDULER_INTERVAL_SERVER_SECONDS: ${SCHEDULER_INTERVAL_SERVER_SECONDS:-60}
      SCHEDULER_INTERVAL_MIKROTIK_SECONDS: ${SCHEDULER_INTERVAL_MIKROTIK_SECONDS:-60}
      SCHEDULER_INTERVAL_ALERT_SECONDS: ${SCHEDULER_INTERVAL_ALERT_SECONDS:-30}
      SCHEDULER_JOB_MAX_INSTANCES: ${SCHEDULER_JOB_MAX_INSTANCES:-1}
      DNS_CHECK_HOST: ${DNS_CHECK_HOST:-google.com}
      HTTP_CHECK_URL: ${HTTP_CHECK_URL:-https://www.google.com/generate_204}
      PUBLIC_IP_CHECK_URL: ${PUBLIC_IP_CHECK_URL:-https://api.ipify.org}
      MONITORING_LOCK_NAME: ${MONITORING_LOCK_NAME:-network_monitoring.pipeline}
      MONITORING_LOCK_TIMEOUT_SECONDS: ${MONITORING_LOCK_TIMEOUT_SECONDS:-900}
      RAW_METRIC_RETENTION_DAYS: ${RAW_METRIC_RETENTION_DAYS:-7}
      RETENTION_ROLLUP_BATCH_SIZE: ${RETENTION_ROLLUP_BATCH_SIZE:-500}
      RETENTION_ARCHIVE_BATCH_SIZE: ${RETENTION_ARCHIVE_BATCH_SIZE:-500}
      ALERT_RETENTION_DAYS: ${ALERT_RETENTION_DAYS:-180}
      INCIDENT_RETENTION_DAYS: ${INCIDENT_RETENTION_DAYS:-180}
      SCHEDULER_CLEANUP_INTERVAL_HOURS: ${SCHEDULER_CLEANUP_INTERVAL_HOURS:-24}
      SCHEDULER_JOB_STALE_FACTOR: ${SCHEDULER_JOB_STALE_FACTOR:-3}
      CPU_WARNING_THRESHOLD: ${CPU_WARNING_THRESHOLD:-90}
      RAM_WARNING_THRESHOLD: ${RAM_WARNING_THRESHOLD:-90}
      DISK_WARNING_THRESHOLD: ${DISK_WARNING_THRESHOLD:-85}
      SERVER_RESOURCE_DEVICE_IP: ${SERVER_RESOURCE_DEVICE_IP:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      INTERNAL_API_KEYS: ${INTERNAL_API_KEYS:-}
      AUTH_PASSWORD_SECRET: ${AUTH_PASSWORD_SECRET:-}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-720}
      AUTH_REMEMBER_TTL_MINUTES: ${AUTH_REMEMBER_TTL_MINUTES:-10080}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-network-monitoring}
      AUTH_JWT_ALGORITHM: ${AUTH_JWT_ALGORITHM:-HS256}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-network_monitoring_session}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-network_monitoring_refresh}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_LOGIN_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-5}
      AUTH_LOGIN_RATE_LIMIT_WINDOW_MINUTES: ${AUTH_LOGIN_RATE_LIMIT_WINDOW_MINUTES:-15}
      AUTH_SESSION_TOUCH_INTERVAL_SECONDS: ${AUTH_SESSION_TOUCH_INTERVAL_SECONDS:-300}
      AUTH_SESSION_RETENTION_DAYS: ${AUTH_SESSION_RETENTION_DAYS:-30}
      AUTH_LOGIN_ATTEMPT_RETENTION_DAYS: ${AUTH_LOGIN_ATTEMPT_RETENTION_DAYS:-7}
      AUTH_PASSWORD_MIN_LENGTH: ${AUTH_PASSWORD_MIN_LENGTH:-12}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_FULL_NAME: ${BOOTSTRAP_ADMIN_FULL_NAME:-Monitoring Admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?BOOTSTRAP_ADMIN_PASSWORD must be set}
      ALLOW_INSECURE_NO_AUTH: ${ALLOW_INSECURE_NO_AUTH:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS must be set}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:?TRUSTED_HOSTS must be set}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
      PRINTER_SNMP_COMMUNITIES: ${PRINTER_SNMP_COMMUNITIES:-}
      OBSERVABILITY_ENABLE_METRICS: ${OBSERVABILITY_ENABLE_METRICS:-true}
      LOG_AS_JSON: ${LOG_AS_JSON:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REQUEST_SLOW_LOG_THRESHOLD_MS: ${REQUEST_SLOW_LOG_THRESHOLD_MS:-1000}
      PROMETHEUS_MULTIPROC_DIR: ${PROMETHEUS_MULTIPROC_DIR:-/tmp/network_monitoring_prometheus}
    command: ["sh", "-c", "mkdir -p \"$${PROMETHEUS_MULTIPROC_DIR}\" && rm -f \"$${PROMETHEUS_MULTIPROC_DIR}\"/*.db && python -m backend.app.scheduler.worker"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: network_monitoring_dashboard
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DASHBOARD_API_URL: http://backend:8000
      DASHBOARD_PUBLIC_API_URL: ${DASHBOARD_PUBLIC_API_URL:?DASHBOARD_PUBLIC_API_URL must be set}
    ports:
      - "127.0.0.1:8501:8501"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
