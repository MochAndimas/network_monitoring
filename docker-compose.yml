services:
  postgres:
    image: postgres:16
    container_name: network_monitoring_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-network_monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-network_monitoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: network_monitoring_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Network Monitoring}
      APP_ENV: ${APP_ENV:-production}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-network_monitoring}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-network_monitoring}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      MIKROTIK_HOST: ${MIKROTIK_HOST:-}
      MIKROTIK_USERNAME: ${MIKROTIK_USERNAME:-}
      MIKROTIK_PASSWORD: ${MIKROTIK_PASSWORD:-}
      DASHBOARD_API_URL: http://backend:8000
      PING_TIMEOUT_SECONDS: ${PING_TIMEOUT_SECONDS:-2}
      PING_SAMPLE_COUNT: ${PING_SAMPLE_COUNT:-3}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_INTERVAL_INTERNET_SECONDS: ${SCHEDULER_INTERVAL_INTERNET_SECONDS:-30}
      SCHEDULER_INTERVAL_DEVICE_SECONDS: ${SCHEDULER_INTERVAL_DEVICE_SECONDS:-60}
      SCHEDULER_INTERVAL_SERVER_SECONDS: ${SCHEDULER_INTERVAL_SERVER_SECONDS:-60}
      SCHEDULER_INTERVAL_MIKROTIK_SECONDS: ${SCHEDULER_INTERVAL_MIKROTIK_SECONDS:-60}
      SCHEDULER_INTERVAL_ALERT_SECONDS: ${SCHEDULER_INTERVAL_ALERT_SECONDS:-30}
      DNS_CHECK_HOST: ${DNS_CHECK_HOST:-google.com}
      HTTP_CHECK_URL: ${HTTP_CHECK_URL:-https://www.google.com/generate_204}
      PUBLIC_IP_CHECK_URL: ${PUBLIC_IP_CHECK_URL:-https://api.ipify.org}
      RAW_METRIC_RETENTION_DAYS: ${RAW_METRIC_RETENTION_DAYS:-7}
      ALERT_RETENTION_DAYS: ${ALERT_RETENTION_DAYS:-180}
      INCIDENT_RETENTION_DAYS: ${INCIDENT_RETENTION_DAYS:-180}
      SCHEDULER_CLEANUP_INTERVAL_HOURS: ${SCHEDULER_CLEANUP_INTERVAL_HOURS:-24}
      CPU_WARNING_THRESHOLD: ${CPU_WARNING_THRESHOLD:-90}
      RAM_WARNING_THRESHOLD: ${RAM_WARNING_THRESHOLD:-90}
      DISK_WARNING_THRESHOLD: ${DISK_WARNING_THRESHOLD:-85}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: network_monitoring_dashboard
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DASHBOARD_API_URL: http://backend:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set}
    ports:
      - "8501:8501"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
